# Replicate Cog — runs the FULL Roar Bliss personalization pipeline as one pay-per-use,
# scale-to-zero model (Demucs -> Whisper -> pyannote -> Sonnet planner -> TTS -> ffmpeg mix).
#
# Deploy (from the repo root):
#   pip install cog            # one-time
#   cog login                  # uses your Replicate token
#   cog push r8.im/<your-replicate-username>/roar-bliss
#
# Secret env vars to set in the Replicate model's settings (NOT committed here):
#   ANTHROPIC_API_KEY   - the Sonnet/Haiku planner
#   HF_TOKEN            - pyannote diarization model download
#   REPLICATE_API_TOKEN - F5-TTS voice cloning (v1 calls Replicate's F5; later: host F5 in-cog)
build:
  # GPU build. UPGRADE (2026-06-15): CUDA 12.4 + torch 2.6.0 (cu124) to fix OmniVoice CROSS-LINGUAL garbling.
  # torch 2.5.1/cu121 rendered clean English on CUDA but SCRAMBLED cross-lingual German (eager attention at
  # num_step=80 garbles on 2.5.1's CUDA kernels; local MPS clean; fp16/bf16/fp32 all garbled → not precision).
  # torch 2.6 ships fixed kernels; needs cu124 (no cu121 past 2.5.1). REQUIRES cog>=~0.20 (pinned in the GH
  # workflow) — the action's default cog v0.9.8 panics on cuda 12.4 (no cuDNN map). cu124 matches the 12.4 box.
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  system_packages:
    - "ffmpeg"
    - "libsndfile1"
    - "git"
  python_packages:
    - "pydub==0.25.1"
    - "librosa==0.11.0"
    - "numpy<2.3"
    - "soundfile==0.13.1"
    - "audioread==3.0.1"
    - "scipy>=1.11"
    - "matplotlib"
    - "torch==2.6.0"
    - "torchaudio==2.6.0"
    - "transformers==5.11.0"
    - "accelerate==1.13.0"
    - "demucs==4.0.1"
    - "anthropic==0.75.0"
    - "requests==2.32.3"
    - "langdetect==1.0.9"   # deterministic (seeded) language detection for the watchdog (validators.py)
    - "setuptools<81"
  run:
    # pyannote.audio is a dotted namespace pkg (Cog's python_packages parser mangles it); install via raw
    # pip. 3.4.0 coexists with the OmniVoice stack (transformers 5.x + huggingface_hub 1.x) — PROVEN in the
    # local venv that ran the full multi-speaker pipeline. pyannote 3.4 still calls
    # hf_hub_download(use_auth_token=) AND trips torch's weights_only default; diarization.py shims BOTH so
    # pyannote loads against the new hub/torch (this REPLACES the old hub==0.25.2 pin).
    - "pip install --no-cache-dir pyannote.audio==3.4.0 && pip install --no-cache-dir 'huggingface_hub==1.18.0' 'transformers==5.11.0' && python -c 'import pyannote.audio, huggingface_hub, transformers; print(\"pyannote\", pyannote.audio.__version__, \"hub\", huggingface_hub.__version__, \"tf\", transformers.__version__)' && echo cache-bust-omnivoice-v4-cu121force"
    # openai-whisper ships an sdist whose setup.py imports pkg_resources; build against setuptools<81.
    - "pip install --no-cache-dir --no-build-isolation openai-whisper==20250625"
    # OmniVoice (Higgs Audio v2) = THE engine. 0.3.5 is git-only (PyPI lags at 0.1.5). --no-deps because the
    # model's only runtime imports are torch/torchaudio/transformers/numpy/pydub (+accelerate), all present.
    - "pip install --no-cache-dir --no-deps 'git+https://github.com/debpalash/OmniVoice-Studio.git' && python -c 'import omnivoice.models.omnivoice; print(\"omnivoice ok\")'"
    # Bake the ~3GB weights + the Higgs audio tokenizer into the image so scale-to-zero cold-starts never
    # re-download them.
    - "n=0; until python -c \"from huggingface_hub import snapshot_download; snapshot_download('k2-fsa/OmniVoice'); snapshot_download('eustlb/higgs-audio-v2-tokenizer')\"; do n=$((n+1)); [ $n -ge 10 ] && echo 'HF download failed after retries' && exit 1; echo \"hf 429/transient — retry $n in 120s\"; sleep 120; done && echo weights-ready-retry-v2"
    # FINAL step (must be LAST): force torch 2.5.1+cu121. The earlier pip installs (pyannote / transformers /
    # omnivoice) re-pull torch's nvidia-*-cu12 deps back to the cu124 (12.4.127) PyPI default on the 12.1 box
    # → torch.cuda.is_available()=False → CPU fallback (the 32min/run bug). Reinstalling cu121 LAST pins the
    # nvidia libs to 12.1.105 (matches the box) and nothing runs after to undo it. Assert the build cuda tag.
    - "pip install --no-cache-dir --force-reinstall torch==2.6.0 torchaudio==2.6.0 --index-url https://download.pytorch.org/whl/cu124 && python -c 'import torch; print(\"FINAL torch\", torch.__version__, \"cuda\", torch.version.cuda, \"avail\", torch.cuda.is_available())' && echo cache-bust-omnivoice-v6-torch26cu124"
predict: "predict.py:Predictor"
