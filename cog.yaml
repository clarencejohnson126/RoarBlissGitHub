# Replicate Cog — runs the FULL Roar Bliss personalization pipeline as one pay-per-use,
# scale-to-zero model (Demucs -> Whisper -> pyannote -> Sonnet planner -> TTS -> ffmpeg mix).
#
# Deploy (from the repo root):
#   pip install cog            # one-time
#   cog login                  # uses your Replicate token
#   cog push r8.im/<your-replicate-username>/roar-bliss
#
# Secret env vars to set in the Replicate model's settings (NOT committed here):
#   ANTHROPIC_API_KEY   - the Sonnet/Haiku planner
#   HF_TOKEN            - pyannote diarization model download
#   REPLICATE_API_TOKEN - F5-TTS voice cloning (v1 calls Replicate's F5; later: host F5 in-cog)
build:
  # GPU build. torch 2.5.1: OmniVoice (Higgs Audio v2) imports torch.nn.attention.flex_attention which
  # only exists in torch >=2.5. torch 2.5.1's PyPI wheel bundles CUDA 12.4 libs (nvidia-*-cu12==12.4.x),
  # so the cog CUDA must MATCH — cuda 12.1 mismatched it → torch.cuda.is_available()=False → CPU fallback
  # (catastrophically slow: a run took 32min on CPU). cuda 12.4 matches the wheel → GPU. (Cog supports
  # up to 12.4; 12.6 is the unsupported one.) GPU cuts Demucs/Whisper/pyannote/OmniVoice ~5-15x vs CPU.
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  system_packages:
    - "ffmpeg"
    - "libsndfile1"
    - "git"
  python_packages:
    - "pydub==0.25.1"
    - "librosa==0.11.0"
    - "numpy<2.3"
    - "soundfile==0.13.1"
    - "audioread==3.0.1"
    - "scipy>=1.11"
    - "matplotlib"
    - "torch==2.5.1"
    - "torchaudio==2.5.1"
    - "transformers==5.11.0"
    - "accelerate==1.13.0"
    - "demucs==4.0.1"
    - "anthropic==0.75.0"
    - "requests==2.32.3"
    - "setuptools<81"
  run:
    # pyannote.audio is a dotted namespace pkg (Cog's python_packages parser mangles it); install via raw
    # pip. 3.4.0 coexists with the OmniVoice stack (transformers 5.x + huggingface_hub 1.x) — PROVEN in the
    # local venv that ran the full multi-speaker pipeline. pyannote 3.4 still calls
    # hf_hub_download(use_auth_token=) AND trips torch's weights_only default; diarization.py shims BOTH so
    # pyannote loads against the new hub/torch (this REPLACES the old hub==0.25.2 pin).
    - "pip install --no-cache-dir pyannote.audio==3.4.0 && pip install --no-cache-dir 'huggingface_hub==1.18.0' 'transformers==5.11.0' && python -c 'import pyannote.audio, huggingface_hub, transformers; print(\"pyannote\", pyannote.audio.__version__, \"hub\", huggingface_hub.__version__, \"tf\", transformers.__version__)' && echo cache-bust-omnivoice-v3-cuda124"
    # openai-whisper ships an sdist whose setup.py imports pkg_resources; build against setuptools<81.
    - "pip install --no-cache-dir --no-build-isolation openai-whisper==20250625"
    # OmniVoice (Higgs Audio v2) = THE engine. 0.3.5 is git-only (PyPI lags at 0.1.5). --no-deps because the
    # model's only runtime imports are torch/torchaudio/transformers/numpy/pydub (+accelerate), all present.
    - "pip install --no-cache-dir --no-deps 'git+https://github.com/debpalash/OmniVoice-Studio.git' && python -c 'import omnivoice.models.omnivoice; print(\"omnivoice ok\")'"
    # Bake the ~3GB weights + the Higgs audio tokenizer into the image so scale-to-zero cold-starts never
    # re-download them.
    - "python -c \"from huggingface_hub import snapshot_download; snapshot_download('k2-fsa/OmniVoice'); snapshot_download('eustlb/higgs-audio-v2-tokenizer')\""
predict: "predict.py:Predictor"
