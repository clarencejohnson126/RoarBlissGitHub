# Replicate Cog — runs the FULL Roar Bliss personalization pipeline as one pay-per-use,
# scale-to-zero model (Demucs -> Whisper -> pyannote -> Sonnet planner -> TTS -> ffmpeg mix).
#
# Deploy (from the repo root):
#   pip install cog            # one-time
#   cog login                  # uses your Replicate token
#   cog push r8.im/<your-replicate-username>/roar-bliss
#
# Secret env vars to set in the Replicate model's settings (NOT committed here):
#   ANTHROPIC_API_KEY   - the Sonnet/Haiku planner
#   HF_TOKEN            - pyannote diarization model download
#   REPLICATE_API_TOKEN - F5-TTS voice cloning (v1 calls Replicate's F5; later: host F5 in-cog)
build:
  # GPU build. torch 2.4 + pyannote 3.3 run on a Cog-supported CUDA (unlike torch 2.8 / pyannote
  # 4.0.4 which forced CUDA 12.6 → the earlier CPU fallback). GPU cuts the ML preprocessing
  # (Demucs / Whisper / pyannote) ~5-15x — that's the dominant cost for longer tracks (~60-70%).
  gpu: true
  # Cog can't infer the CUDA version for torch 2.4.1, so pin it. torch 2.4.1 ships cu121 wheels and
  # Cog supports CUDA 12.1 → torch 2.4.1+cu121 on the GPU box.
  cuda: "12.1"
  python_version: "3.11"
  system_packages:
    - "ffmpeg"
    - "libsndfile1"
    - "git"
  python_packages:
    - "pydub==0.25.1"
    - "librosa==0.11.0"
    - "numpy<2.3"
    - "soundfile==0.13.1"
    - "audioread==3.0.1"
    - "scipy>=1.11"
    - "matplotlib"
    - "torch==2.4.1"
    - "torchaudio==2.4.1"
    - "demucs==4.0.1"
    - "anthropic==0.75.0"
    - "requests==2.32.3"
    - "setuptools<81"
  run:
    # pyannote.audio is a dotted namespace pkg (Cog's python_packages parser mangles it to 'audio==…');
    # install via raw pip. 3.3.x runs on torch 2.4 (GPU on a Cog-supported CUDA) and uses the same
    # speaker-diarization-3.1 model the code already targets — diarization.py handles 3.x and 4.x output.
    # pyannote 3.3.2 still calls huggingface_hub with the `use_auth_token` kwarg, which hub 0.26+
    # removed. Force hub back to 0.25.2 (last release that has it) AFTER pyannote so its own deps
    # can't bump it. Print both versions to confirm in the build log.
    - "pip install --no-cache-dir pyannote.audio==3.3.2 && pip install --no-cache-dir 'huggingface_hub==0.25.2' && python -c 'import pyannote.audio, huggingface_hub; print(pyannote.audio.__version__, huggingface_hub.__version__)' && echo cache-bust-elevenlabs"
    # openai-whisper ships an sdist whose setup.py imports pkg_resources; build it against the
    # already-installed setuptools<81 (no isolated overlay that would pull setuptools>=81).
    - "pip install --no-cache-dir --no-build-isolation openai-whisper==20250625"
predict: "predict.py:Predictor"
